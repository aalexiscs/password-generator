<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#6366F1" />
    <title>Password Generator</title>
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icon.svg" />
    <link rel="manifest" href="manifest.json" />

    <!-- Material Symbols (icons) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <!-- Background Animated Shapes -->
    <div class="bg-shapes">
      <div class="shape shape-1"></div>
      <div class="shape shape-2"></div>
      <div class="shape shape-3"></div>
    </div>

    <main class="container">
      <!-- ── Header ── -->
      <header class="app-header">
        <div class="header-content">
          <div class="app-title-group">
            <span class="material-symbols-rounded app-icon">lock</span>
            <h1 class="app-title">Password Generator</h1>
          </div>
        </div>
      </header>

      <!-- ── Main Card (Single Column) ── -->
      <div class="main-card">
        
        <!-- Password Display -->
        <div class="password-display-wrapper">
          <div class="password-display" id="passwordDisplay">
            <span id="passwordText" class="password-text placeholder">Haz clic en Generar</span>
          </div>
          <div class="action-buttons">
            <button class="icon-btn copy-btn" id="copyBtn" title="Copiar contraseña" disabled>
              <span class="material-symbols-rounded" id="copyIcon">content_copy</span>
            </button>
            <div class="btn-separator"></div>
            <button class="icon-btn theme-toggle" id="themeToggle" title="Cambiar tema" aria-label="Cambiar tema">
              <span class="material-symbols-rounded" id="themeIcon">dark_mode</span>
            </button>
          </div>
        </div>

        <!-- Strength Indicator -->
        <div class="strength-section" id="strengthSection" style="display:none">
          <div class="strength-bar-container">
            <div class="strength-bar" id="strengthBar"></div>
          </div>
          <span class="strength-label" id="strengthLabel"></span>
        </div>

        <div class="divider"></div>

        <!-- Length Slider -->
        <div class="option-group">
          <div class="option-header">
            <label class="option-label" for="lengthSlider">Longitud</label>
            <span class="length-badge" id="lengthValue">16</span>
          </div>
          <div class="slider-wrapper">
            <span class="slider-min">8</span>
            <input
              type="range"
              id="lengthSlider"
              class="slider"
              min="8"
              max="64"
              value="16"
              step="1"
            />
            <span class="slider-max">64</span>
          </div>
        </div>

        <!-- Character Options -->
        <div class="option-group">
          <p class="option-label">Caracteres incluidos</p>
          <div class="toggles-grid">

            <label class="toggle-item" for="toggleUpper">
              <span class="toggle-title">Mayúsculas</span>
              <div class="toggle-switch">
                <input type="checkbox" id="toggleUpper" checked />
                <span class="toggle-track"></span>
              </div>
            </label>

            <label class="toggle-item" for="toggleLower">
              <span class="toggle-title">Minúsculas</span>
              <div class="toggle-switch">
                <input type="checkbox" id="toggleLower" checked />
                <span class="toggle-track"></span>
              </div>
            </label>

            <label class="toggle-item" for="toggleNumbers">
              <span class="toggle-title">Números</span>
              <div class="toggle-switch">
                <input type="checkbox" id="toggleNumbers" checked />
                <span class="toggle-track"></span>
              </div>
            </label>

            <label class="toggle-item" for="toggleSymbols">
              <span class="toggle-title">Símbolos</span>
              <div class="toggle-switch">
                <input type="checkbox" id="toggleSymbols" />
                <span class="toggle-track"></span>
              </div>
            </label>

          </div>
        </div>

        <!-- Auto-copy checkbox -->
        <label class="auto-copy-label" for="toggleAutoCopy">
          <div class="auto-copy-check">
            <input type="checkbox" id="toggleAutoCopy" />
            <span class="auto-copy-box">
              <span class="material-symbols-rounded auto-copy-check-icon">check</span>
            </span>
          </div>
          <span class="auto-copy-text">Copiar automáticamente</span>
        </label>

        <!-- Generate Button -->
        <button class="btn-generate" id="generateBtn">
          Generar Contraseña
        </button>

        <!-- Share Button -->
        <button class="btn-share" id="shareBtn" title="Compartir aplicación">
          <span class="material-symbols-rounded">share</span>
          Compartir App
        </button>

      </div><!-- /main-card -->

      <footer class="app-footer">
        <a href="https://github.com/aalexiscs" target="_blank" rel="noopener noreferrer" class="footer-link" title="Ver perfil en GitHub">
          <svg class="footer-icon" viewBox="0 0 24 24" aria-hidden="true" fill="currentColor">
            <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
          </svg>
          <span>aalexiscs</span>
        </a>
      </footer>
    </main>

    <!-- Toast notification -->
    <div class="toast" id="toast" role="status" aria-live="polite">
      <span class="toast-icon material-symbols-rounded">check_circle</span>
      <span class="toast-text">Copiada al portapapeles</span>
    </div>

    <script src="js/app.js"></script>
  </body>
</html>
